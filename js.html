<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb Toggle</title>
</head>

<body>

    <p id="demo"></p>

    <script>
        document.getElementById("demo").innerHTML = "Hello JavaScript!";
        document.write("This is a simple JavaScript code.<br>");
        document.write(5 + 10);
    </script>

    <br><br>

    <button onclick="alert('Button clicked!')">Click Me</button>

    <br><br>

    <!-- IMAGE -->
    <img id="bulb"
         src="image/bulb_off.jpg"
         alt="bulb"
         width="100"
         height="100">

    <br><br>

    <!-- BUTTONS -->
    <button type="button"
        onclick="document.getElementById('bulb').src='image/bulb_on.webp'">
        Turn On
    </button>

    <button type="button"
        onclick="document.getElementById('bulb').src='image/bulb_off.jpg'">
        Turn Off
    </button>

</body>
</html>
